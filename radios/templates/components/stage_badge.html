{% if status == "done" %}
  <span class="px-2 py-0.5 rounded text-xs font-semibold bg-green-200 text-green-800 dark:bg-green-900 dark:text-green-200">{{ label }}</span>
{% elif status == "failed" %}
  <span class="px-2 py-0.5 rounded text-xs font-semibold bg-red-200 text-red-800 dark:bg-red-900 dark:text-red-200">{{ label }}</span>
{% elif status == "running" %}
  <span class="px-2 py-0.5 rounded text-xs font-semibold bg-yellow-200 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200">{{ label }}</span>
{% elif status == "skipped" %}
  <span class="px-2 py-0.5 rounded text-xs font-semibold bg-gray-100 text-gray-500 dark:bg-gray-700 dark:text-gray-400">{{ label }}</span>
{% else %}
  <span class="px-2 py-0.5 rounded text-xs font-semibold bg-gray-200 text-gray-700 dark:bg-gray-600 dark:text-gray-300">{{ label }}</span>
{% endif %}
